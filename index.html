<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Presensi GPS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #eef2f3; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #dfe6e9; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #3498db; outline: none; }
        
        button { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: 0.3s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
        
        #status { 
            margin-top: 20px; 
            font-size: 13px; 
            color: #e67e22; 
            font-weight: 500;
        }
        .footer { margin-top: 25px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>Presensi GPS</h2>
    <p class="subtitle">Silakan isi data untuk mencatat kehadiran</p>
    
    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Contoh: Budi Santoso">
    </div>
    
    <div class="form-group">
        <label>Jabatan / Seksi</label>
        <input type="text" id="jabatan" placeholder="Contoh: Seksi Umum">
    </div>
    
    <button id="btnAbsen" onclick="prosesAbsen()">Kirim Presensi Sekarang</button>
    
    <p id="status">Siap mencatat kehadiran</p>
    
    <div class="footer">Sistem Presensi Digital v1.0</div>
</div>

<script>
    /** * PENTING: Ganti link di bawah ini dengan URL Web App 
     * yang Anda dapat dari Google Apps Script (yang berakhiran /exec)
     */
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwbQ1SdPE0KClqS7VXgSh0ps9Tu0tuETuxOfa93kI7eYvVxIn-y3w0drDjYOmWwUxVOjQ/exec';

    function prosesAbsen() {
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const btn = document.getElementById('btnAbsen');
        const status = document.getElementById('status');

        if (!nama || !jabatan) {
            alert("Harap isi Nama dan Jabatan Anda!");
            return;
        }

        // Cek apakah link API sudah diganti
        if (scriptURL === 'PASTE_URL_WEB_APP_DISINI') {
            alert("Error: Link API belum dipasang di dalam script!");
            return;
        }

        btn.disabled = true;
        status.innerText = "📍 Mencari lokasi GPS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lokasi = position.coords.latitude + "," + position.coords.longitude;
                status.innerText = "⏳ Mengirim data ke database...";

                // Mengirim data ke Google Sheets melalui Apps Script
                fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({
                        "nama": nama,
                        "jabatan": jabatan,
                        "lokasi": lokasi
                    })
                })
                .then(response => {
                    alert("Berhasil! Data kehadiran Anda sudah tersimpan.");
                    document.getElementById('nama').value = "";
                    document.getElementById('jabatan').value = "";
                    btn.disabled = false;
                    status.innerText = "✅ Presensi Berhasil Terkirim.";
                })
                .catch(error => {
                    alert("Terjadi kesalahan saat mengirim data.");
                    btn.disabled = false;
                    status.innerText = "❌ Gagal mengirim. Cek koneksi internet.";
                });

            }, function(error) {
                let pesan = "Gagal mengambil lokasi.";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        pesan = "Izin lokasi ditolak. Harap izinkan akses GPS.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        pesan = "Informasi lokasi tidak tersedia.";
                        break;
                    case error.TIMEOUT:
                        pesan = "Waktu pengambilan lokasi habis.";
                        break;
                }
                alert(pesan);
                btn.disabled = false;
                status.innerText = "⚠️ GPS Bermasalah.";
            }, { enableHighAccuracy: true });
        } else {
            alert("Browser Anda tidak mendukung pengambilan lokasi GPS.");
        }
    }
</script>

</body>
</html>
